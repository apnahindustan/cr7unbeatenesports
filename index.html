
<!DOCTYPE html>
<html>
<head>
<title>CR7 UNBEATEN ESPORTS</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{margin:0;background:#0e0e0e;color:white;font-family:Arial;}
.header{display:flex;align-items:center;gap:10px;background:#000;padding:10px;border-bottom:2px solid #ffb84d;}
.logo{height:40px;}
.site{font-size:18px;font-weight:bold;}
.bannerSlider{display:flex;justify-content:center;gap:15px;padding:10px;overflow-x:auto;scroll-behavior:smooth;}
.bannerSlider img{height:140px;border-radius:6px;}
.menu{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;margin:10px;}
.menu button{padding:8px 14px;border:none;background:#ffb84d;cursor:pointer;font-weight:bold;}
.resultBox{max-width:1000px;margin:auto;padding:20px;background-size:cover;background-position:center;border-radius:10px;}
.resultHeader{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.resultHeader img{height:60px;}
.titleBlock{text-align:center;flex:1;}
.titleText{font-size:28px;font-weight:bold;}
.orgText{font-size:18px;font-weight:bold;margin-top:4px;}
table{width:100%;border-collapse:separate;border-spacing:0 8px;}
th{background:#000;color:#fff;padding:10px;}
td{padding:10px;text-align:center;}
.rank{background:#ffd400;color:#000;font-weight:bold;}
.team{background:#0a0a2a;text-align:left;font-weight:bold;}
.stat{background:#ffd400;color:#000;font-weight:bold;}
.card{background:#1c1c1c;padding:10px;margin:10px;border-radius:6px;}
.dlBtn{display:block;margin:10px auto;padding:8px 20px;background:#ffb84d;border:none;cursor:pointer;font-weight:bold;font-size:14px;border-radius:4px;}
</style>
</head>
<body>

<div class="header">
<img src="logo.png" class="logo">
<div class="site">CR7 UNBEATEN ESPORTS</div>
</div>

<div class="bannerSlider" id="bannerSlider"></div>

<div class="menu">
<button onclick="showSchedule()">Match Schedule</button>
<button onclick="showLive()">Live Result</button>
<button onclick="showHistory()">Previous Result</button>
</div>

<div id="content"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

const firebaseConfig={
apiKey:"AIzaSyAM_vLckdeuYKPHouscSPA_CxE8WlZQbuw",
authDomain:"scoreboard-c69c6.firebaseapp.com",
databaseURL:"https://scoreboard-c69c6-default-rtdb.firebaseio.com",
projectId:"scoreboard-c69c6",
storageBucket:"scoreboard-c69c6.firebasestorage.app",
messagingSenderId:"727943688192",
appId:"1:727943688192:web:077ba0b416957122b968e5"
};

firebase.initializeApp(firebaseConfig);
const db=firebase.database();
const content=document.getElementById("content");

let bannerInterval;

db.ref("banners").on("value",snap=>{
let html="";
snap.forEach(b=>{
const d=b.val();
html+=`<a href="${d.link}" target="_blank"><img src="${d.image}"></a>`;
});
bannerSlider.innerHTML=html;
clearInterval(bannerInterval);
bannerInterval=setInterval(()=>{bannerSlider.scrollLeft+=1;},30);
});

function showSchedule(){
content.innerHTML="<h3 style='text-align:center'>Match Schedule</h3>";
db.ref("schedule").once("value",snap=>{
if(!snap.exists()){content.innerHTML+="<h3>No Result Found</h3>";return;}
snap.forEach(s=>{
const d=s.val();
content.innerHTML+=`<div class="card"><b>${s.key}</b><br>Map : ${d.map}<br>Group : ${d.group}<br>Date : ${d.date}<br>Time : ${d.time}</div>`;
});
});
}

function showLive(){
content.innerHTML="<h3>Live Result</h3>";
db.ref("tournament/live").once("value",snap=>{
if(!snap.exists()){content.innerHTML="<h3>No Result Found</h3>";return;}
const live=snap.val();
db.ref("design").once("value",designSnap=>{
const design=designSnap.val()||{};
content.innerHTML+=`<h3>${design.title||"Tournament"}</h3>`;
for(let i=1;i<=live.totalMatches;i++){
content.innerHTML+=`<button onclick="loadLiveMatch('match${i}')" style="margin:5px;padding:8px 14px;background:#ffb84d;border:none;cursor:pointer;font-weight:bold;">MATCH ${i}</button>`;
}
});
});
}

function loadLiveMatch(match){
const num=match.replace("match","");
content.innerHTML=`<h3 style="text-align:center">MATCH ${num}</h3>`;
Promise.all([
db.ref("teams").once("value"),
db.ref(`tournament/live/matches/${match}`).once("value"),
db.ref("design").once("value")
]).then(([ts,ms,ds])=>{
buildTable(ts.val()||{},ms,ds,`match${num}`);
});
}

function showHistory(){
content.innerHTML="<h3>Previous Tournament</h3>";
db.ref("tournament/history").once("value",snap=>{
if(!snap.exists()){content.innerHTML="<h3>No Result Found</h3>";return;}
snap.forEach(t=>{
content.innerHTML+=`<div class="card"><b>${t.key}</b> <button onclick="viewHistory('${t.key}')">View</button></div>`;
});
});
}

function viewHistory(name){
content.innerHTML=`<h3>${name}</h3>`;
db.ref(`tournament/history/${name}/matches`).once("value",snap=>{
if(!snap.exists()){content.innerHTML+="<h3>No Result Found</h3>";return;}
snap.forEach(m=>{
content.innerHTML+=`<button onclick="loadHistoryMatch('${name}','${m.key}')" style="margin:5px;padding:8px 14px;background:#ffb84d;border:none;cursor:pointer;font-weight:bold;">${m.key}</button>`;
});
});
}

function loadHistoryMatch(name,match){
const num=match.replace("match","");
content.innerHTML=`<h3 style="text-align:center">MATCH ${num}</h3>`;
Promise.all([
db.ref(`tournament/history/${name}/teamsSnapshot`).once("value"),
db.ref(`tournament/history/${name}/matches/${match}`).once("value"),
db.ref("design").once("value")
]).then(([ts,ms,ds])=>{
buildTable(ts.val()||{},ms,ds,`${name}_match${num}`);
});
}

function buildTable(teams,ms,ds,filename){
const matchData=ms.val()||{};
const design=ds.val()||{};
const tColor=design.titleColor||"#ffffff";
const oColor=design.orgColor||"#ffb84d";

let teamsArray=[];
Object.keys(teams).forEach(id=>{
const t=matchData[id]||{kills:0,position:0,total:0};
teamsArray.push({name:teams[id].name,kills:t.kills,place:t.position,total:t.total});
});

const hasResult=teamsArray.some(t=>t.kills>0||t.place>0||t.total>0);
if(!hasResult){content.innerHTML+="<h3>No Result Found</h3>";return;}

teamsArray.sort((a,b)=>b.total-a.total);

const tableId="tbl_"+Date.now();

let html=`
<div id="${tableId}" class="resultBox" style="background-image:url('${design.bg||""}')">
<div class="resultHeader">
<div class="titleText" style="color:${tColor};font-weight:bold;flex:1;text-align:left;">${design.title||"RESULT"}</div>
<img src="${design.logo||""}" style="height:60px;display:block;margin:0 auto;">
<div class="orgText" style="color:${oColor};font-weight:bold;flex:1;text-align:right;">${design.organization||""}</div>
</div>
<table>
<tr><th>RANK</th><th>TEAM NAME</th><th>KILLS</th><th>PLACE</th><th>TOTAL</th></tr>`;

let rank=1;
teamsArray.forEach(t=>{
html+=`<tr>
<td class="rank">${rank}</td>
<td class="team">${t.name}</td>
<td class="stat">${t.kills}</td>
<td class="stat">${t.place}</td>
<td class="stat">${t.total}</td>
</tr>`;
rank++;
});

html+=`</table></div>
<button class="dlBtn" onclick="downloadPNG('${tableId}','${filename}')">⬇ Download PNG</button>`;

content.innerHTML+=html;
}

function downloadPNG(id,filename){
const el=document.getElementById(id);
html2canvas(el,{useCORS:true,scale:2}).then(canvas=>{
const a=document.createElement("a");
a.href=canvas.toDataURL("image/png");
a.download=(filename||"result")+".png";
a.click();
});
}

showLive();

</script>
</body>
</html>
