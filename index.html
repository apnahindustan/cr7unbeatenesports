<!DOCTYPE html>
<html>
<head>
<title>CR7 UNBEATEN ESPORTS</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:#0e0e0e;
color:white;
font-family:Arial;
}

.header{
display:flex;
align-items:center;
gap:10px;
background:#000;
padding:10px;
border-bottom:2px solid #ffb84d;
}

.logo{
height:40px;
}

.site{
font-size:18px;
font-weight:bold;
}

.bannerSlider{
display:flex;
overflow-x:auto;
gap:10px;
padding:10px;
}

.bannerSlider img{
height:140px;
border-radius:6px;
}

.menu{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
margin:10px;
}

.menu button{
padding:8px 14px;
border:none;
background:#ffb84d;
cursor:pointer;
font-weight:bold;
}

.resultBox{
max-width:1000px;
margin:auto;
padding:20px;
background-size:cover;
background-position:center;
border-radius:10px;
}

.resultHeader{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:15px;
}

.resultHeader img{
height:60px;
}

.title{
font-size:28px;
font-weight:bold;
}

table{
width:100%;
border-collapse:separate;
border-spacing:0 8px;
}

th{
background:#000;
color:#fff;
padding:10px;
}

td{
padding:10px;
text-align:center;
}

.rank{
background:#ffd400;
color:#000;
font-weight:bold;
}

.team{
background:#0a0a2a;
text-align:left;
font-weight:bold;
}

.stat{
background:#ffd400;
color:#000;
font-weight:bold;
}

.card{
background:#1c1c1c;
padding:10px;
margin:10px;
border-radius:6px;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png" class="logo">
<div class="site">CR7 UNBEATEN ESPORTS</div>
</div>

<div class="bannerSlider" id="bannerSlider"></div>

<div class="menu">
<button onclick="showSchedule()">Match Schedule</button>
<button onclick="showLive()">Live Result</button>
<button onclick="showHistory()">Previous Result</button>
</div>

<div id="content"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>

const firebaseConfig={
 apiKey:"AIzaSyAM_vLckdeuYKPHouscSPA_CxE8WlZQbuw",
 authDomain:"scoreboard-c69c6.firebaseapp.com",
 databaseURL:"https://scoreboard-c69c6-default-rtdb.firebaseio.com",
 projectId:"scoreboard-c69c6",
 storageBucket:"scoreboard-c69c6.firebasestorage.app",
 messagingSenderId:"727943688192",
 appId:"1:727943688192:web:077ba0b416957122b968e5"
};

firebase.initializeApp(firebaseConfig);

const db=firebase.database();
const content=document.getElementById("content");


/* ---------------- BANNERS ---------------- */

db.ref("banners").on("value",snap=>{

let html="";

snap.forEach(b=>{

const d=b.val();

html+=`
<a href="${d.link}" target="_blank">
<img src="${d.image}">
</a>
`;

});

document.getElementById("bannerSlider").innerHTML=html;

});


/* ---------------- SCHEDULE ---------------- */

function showSchedule(){

content.innerHTML="<h3 style='text-align:center'>Match Schedule</h3>";

db.ref("schedule").once("value",snap=>{

snap.forEach(s=>{

const d=s.val();

content.innerHTML+=`

<div class="card">

<b>${s.key}</b><br>

Map : ${d.map}<br>

Group : ${d.group}<br>

Date : ${d.date}<br>

Time : ${d.time}

</div>

`;

});

});

}


/* ---------------- LIVE RESULT ---------------- */

function showLive(){

content.innerHTML="<h3>Live Result</h3>";

Promise.all([
db.ref("tournament/live").once("value"),
db.ref("design").once("value")
]).then(([liveSnap,designSnap])=>{

if(!liveSnap.exists()){
content.innerHTML+="No Live Match";
return;
}

const live=liveSnap.val();
const design=designSnap.val()||{};

content.innerHTML+=`<h3>${design.title||"Tournament"}</h3>`;

for(let i=1;i<=live.totalMatches;i++){

content.innerHTML+=`
<button onclick="loadLiveMatch(${i})">
MATCH ${i}
</button>
`;

}

});

}


function loadLiveMatch(n){
loadMatchTable(`tournament/live/matches/match${n}`);
}


/* ---------------- HISTORY ---------------- */

function showHistory(){

content.innerHTML="<h3>Previous Tournament</h3>";

db.ref("tournament/history").once("value",snap=>{

snap.forEach(t=>{

content.innerHTML+=`

<div class="card">

<b>${t.key}</b>

<button onclick="viewHistory('${t.key}')">

View

</button>

</div>

`;

});

});

}


function viewHistory(name){

content.innerHTML=`<h3>${name}</h3>`;

db.ref(`tournament/history/${name}/matches`).once("value",snap=>{

snap.forEach(m=>{

content.innerHTML+=`

<button onclick="loadHistoryMatch('${name}','${m.key}')">

${m.key}

</button>

`;

});

});

}


function loadHistoryMatch(name,match){

loadMatchTable(`tournament/history/${name}/matches/${match}`);

}


/* ---------------- TABLE ---------------- */

function loadMatchTable(path){

Promise.all([
db.ref("tournament/teams").once("value"),
db.ref(path).once("value"),
db.ref("design").once("value")
]).then(([ts,ms,ds])=>{

const teams=ts.val()||{};
const match=ms.val()||{};
const design=ds.val()||{};

let teamsArray=[];

Object.keys(teams).forEach(id=>{

const t=match[id]||{};

teamsArray.push({
name:teams[id].name,
kills:t.kills||0,
place:t.position||0,
total:t.total||0
});

});

teamsArray.sort((a,b)=>b.total-a.total);

let html=`

<div class="resultBox" style="background-image:url('${design.bg||""}')">

<div class="resultHeader">

<img src="${design.logo||""}">

<div class="title">${design.title||"RESULT"}</div>

</div>

<table>

<tr>
<th>RANK</th>
<th>TEAM NAME</th>
<th>KILLS</th>
<th>PLACE</th>
<th>TOTAL</th>
</tr>
`;

let rank=1;

teamsArray.forEach(t=>{

html+=`

<tr>

<td class="rank">${rank}</td>
<td class="team">${t.name}</td>
<td class="stat">${t.kills}</td>
<td class="stat">${t.place}</td>
<td class="stat">${t.total}</td>

</tr>

`;

rank++;

});

html+="</table></div>";

content.innerHTML+=html;

});

}

showLive();

</script>

</body>
</html>
